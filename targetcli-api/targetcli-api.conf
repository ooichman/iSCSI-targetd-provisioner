# /etc/targetcli-api/targetcli-api.conf
# ---------------------------------------------------------------------
# NOTE: This file configures the iSCSI Provisioner Backend.
# All storage resources (VG_NAME) must be predefined on the host.
# ---------------------------------------------------------------------

[STORAGE]
# If VG_NAME is missing, script defaults to 'vg-targetd'
VG_NAME = vg-targetd
TARGET_IQN = iqn.2026-03.com.example:target01
TPG_TAG = 1

[NETWORK]
API_PORT = 18700
# API_HOST = 0.0.0.0  <-- If commented out, script prints a note and uses 0.0.0.0
